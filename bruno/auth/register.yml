info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "user@test.com",
        "password": "password123",
        "name": "Regular User"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody()

        if (data && data.token){
          bru.setEnvVar("TOKEN", data.token)
          console.log("Get token success")
        } else{
          console.log("Get token failed")
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
